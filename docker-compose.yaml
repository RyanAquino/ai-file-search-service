x-common-variables: &common-variables
  DB_URL: postgresql+psycopg2://postgres:1@db:5432/ai_search_service
  REDIS_HOST: redis_cache
  REDIS_PORT: 6379
  REDIS_CACHE_DB: 1
  GOOGLE_APPLICATION_CREDENTIALS: "credentials.json"
  PINECONE_API_KEY:
  OPENAI_API_KEY:


services:
  db:
    image: postgres
    container_name: postgresql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 10s
      retries: 120
    ports:
      - "5432:5432"
    expose:
      - 5432
    environment:
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: ai_search_service
      DB_USER: postgres
      DB_PASS: 1

  redis_cache:
    image: redis:latest
    container_name: redis_cache
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    expose:
      - 6379

  api:
    container_name: ai-file-search-service
    build: .
    ports:
      - "3000:3000"
    expose:
      - 3000
    environment: *common-variables
    depends_on:
      db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

  worker-node:
    container_name: ai-file-search-service-worker-node
    build: .
    environment: *common-variables
    entrypoint: sh -c "rq worker --url redis://redis_cache/1"
    depends_on:
      db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

  rq-dashboard-web:
    container_name: rq-dashboard-web
    build: .
    environment: *common-variables
    entrypoint: sh -c "rq-dashboard --redis-url redis://redis_cache/1"
    ports:
      - "9181:9181"
    expose:
      - 9181
